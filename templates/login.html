<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Warehouse Management</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash-message">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="card" style="width: 100%; max-width: 450px; margin-top: 50px;">
    <h2>Warehouse Login</h2>
    <p style="color: var(--text-muted); margin-bottom: 20px;">Welcome back! Please enter your credentials.</p>
    
    <form method="POST">
      <div style="text-align: left; max-width: 400px; margin: 0 auto;">
        <label>Username</label>
        <input name="username" placeholder="Enter your username" required>
        
        <label>Password</label>
        <input name="password" type="password" placeholder="Enter your password" required>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 15px; padding: 12px;">Login</button>
      </div>
    </form>
  </div>
</body>
</html>
